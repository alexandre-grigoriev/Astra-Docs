services:

  # ── Backend — Node.js / Express ──────────────────────────────────────────────
  backend:
    build:
      context: ..                          # project root
      dockerfile: docker/Dockerfile.backend
    restart: unless-stopped
    volumes:
      # .env is mounted read-only so secrets never bake into the image
      - ./data/backend.env:/app/.env:ro
      # Persistent data: SQLite DB and KB images share the same host directory
      - ./data/uploads:/data/uploads
      - ./data/users.db:/data/users.db
    environment:
      # Tell the app where to find the DB and the uploads directory
      UPLOADS_DIR: /data/uploads
      DB_PATH:     /data/users.db
    networks:
      - astra
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 15s

  # ── Frontend — React SPA served by Nginx (also reverse-proxies the backend) ─
  frontend:
    build:
      context: ..                          # project root
      dockerfile: docker/Dockerfile.frontend
      args:
        # Gemini key is embedded at build time (used directly from the browser)
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - astra

networks:
  astra:
    driver: bridge
