server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Static assets — long cache ────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Backend proxy — API, auth, and uploaded KB images ────────────────────
    location ~ ^/(api|auth|uploads)(/.*)?$ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE (batch-progress stream) — disable buffering
        proxy_buffering    off;
        proxy_cache        off;

        # Long timeouts for LLM calls and large ZIP uploads
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        client_max_body_size 200m;
    }

    # ── SPA fallback — all other paths serve index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
