services:

  backend:
    image: aipoclab/astra-docs-backend:latest
    restart: unless-stopped
    volumes:
      - ./data/backend.env:/app/.env:ro
      - ./data/uploads:/data/uploads
      - ./data/users.db:/data/users.db
    environment:
      UPLOADS_DIR: /data/uploads
      DB_PATH:     /data/users.db
    networks:
      - astra
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 15s

  frontend:
    image: aipoclab/astra-docs-frontend:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /etc/ssl/astra:/etc/ssl/astra:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - astra

networks:
  astra:
    driver: bridge
